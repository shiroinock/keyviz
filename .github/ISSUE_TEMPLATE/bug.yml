name: バグ報告
description: 不具合の報告
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: 概要
      description: 何が起きているか
      placeholder: "例: VIA JSON を読み込むと一部のキーが表示されない"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 再現手順
      description: 再現するための手順
      placeholder: |
        1. ...
        2. ...
        3. ...

  - type: textarea
    id: expected
    attributes:
      label: 期待される動作
      description: 本来どうあるべきか
