name: Epic Auto Done

on:
  issues:
    types: [closed]

permissions:
  issues: read

env:
  PROJECT_NUMBER: 6
  PROJECT_OWNER: shiroinock
  PROJECT_ID: PVT_kwHOAq02ps4BTFDk
  STATUS_FIELD_ID: PVTSSF_lAHOAq02ps4BTFDkzhAbPBc
  DONE_OPTION_ID: "98236657"

jobs:
  check-and-update-epic:
    runs-on: ubuntu-latest
    steps:
      - name: Get parent issues
        id: get-parents
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          PARENTS=$(gh api graphql -f query='
            query($owner: String!, $repo: String!, $number: Int!) {
              repository(owner: $owner, name: $repo) {
                issue(number: $number) {
                  trackedInIssues(first: 10) {
                    nodes {
                      number
                      state
                    }
                  }
                }
              }
            }' -f owner="$REPO_OWNER" \
               -f repo="$REPO_NAME" \
               -F number="$ISSUE_NUMBER" \
            --jq '[.data.repository.issue.trackedInIssues.nodes[] | .number] | .[]') || {
            echo "::warning::Failed to query parent issues"
            exit 0
          }

          if [ -z "$PARENTS" ]; then
            echo "No parent issues found, skipping."
            echo "has_parents=false" >> "$GITHUB_OUTPUT"
          else
            echo "Parent issue numbers: $PARENTS"
            echo "has_parents=true" >> "$GITHUB_OUTPUT"
            echo "parent_numbers<<EOF" >> "$GITHUB_OUTPUT"
            echo "$PARENTS" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi

      - name: Check sub-issues and update project status
        if: steps.get-parents.outputs.has_parents == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROJECT_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          PARENT_NUMBERS: ${{ steps.get-parents.outputs.parent_numbers }}
        run: |
          while IFS= read -r parent_number; do
            [ -z "$parent_number" ] && continue

            echo "Checking sub-issues for epic #${parent_number}..."

            if ! SUBISSUES=$(gh api graphql -f query='
              query($owner: String!, $repo: String!, $number: Int!) {
                repository(owner: $owner, name: $repo) {
                  issue(number: $number) {
                    subIssues(first: 100) {
                      totalCount
                      nodes {
                        number
                        state
                      }
                    }
                  }
                }
              }' -f owner="$REPO_OWNER" \
                 -f repo="$REPO_NAME" \
                 -F number="$parent_number"); then
              echo "::warning::Failed to query sub-issues for epic #${parent_number}"
              continue
            fi

            TOTAL=$(echo "$SUBISSUES" | jq '.data.repository.issue.subIssues.totalCount')
            CLOSED_COUNT=$(echo "$SUBISSUES" | jq '[.data.repository.issue.subIssues.nodes[] | select(.state == "CLOSED")] | length')

            echo "Epic #${parent_number}: total=${TOTAL}, closed=${CLOSED_COUNT}"

            if [ "$TOTAL" -eq 0 ]; then
              echo "Epic #${parent_number} has no sub-issues, skipping."
              continue
            fi

            if [ "$TOTAL" -ne "$CLOSED_COUNT" ]; then
              echo "Epic #${parent_number} still has open sub-issue(s) (total=${TOTAL}, closed=${CLOSED_COUNT}), skipping."
              continue
            fi

            echo "All sub-issues closed for epic #${parent_number}. Finding project item..."

            ITEM_ID=$(GH_TOKEN="$PROJECT_TOKEN" gh api graphql -f query='
              query($owner: String!, $number: Int!) {
                user(login: $owner) {
                  projectV2(number: $number) {
                    items(first: 100) {
                      nodes {
                        id
                        content {
                          ... on Issue {
                            number
                          }
                        }
                      }
                    }
                  }
                }
              }' -f owner="$PROJECT_OWNER" \
                 -F number="$PROJECT_NUMBER" \
              --jq ".data.user.projectV2.items.nodes[] | select(.content.number == ${parent_number}) | .id") || {
              echo "::warning::Failed to query project items for epic #${parent_number}"
              continue
            }

            if [ -z "$ITEM_ID" ]; then
              echo "Epic #${parent_number} is not in project, skipping."
              continue
            fi

            echo "Updating project item ${ITEM_ID} to Done..."
            GH_TOKEN="$PROJECT_TOKEN" gh project item-edit \
              --project-id "$PROJECT_ID" \
              --id "$ITEM_ID" \
              --field-id "$STATUS_FIELD_ID" \
              --single-select-option-id "$DONE_OPTION_ID"

            echo "Verifying update for epic #${parent_number}..."
            VERIFIED=false
            for i in 1 2 3; do
              sleep 3
              CURRENT_STATUS=$(GH_TOKEN="$PROJECT_TOKEN" gh api graphql -f query='
                query($owner: String!, $number: Int!) {
                  user(login: $owner) {
                    projectV2(number: $number) {
                      items(first: 100) {
                        nodes {
                          id
                          fieldValues(first: 20) {
                            nodes {
                              ... on ProjectV2ItemFieldSingleSelectValue {
                                optionId
                                field {
                                  ... on ProjectV2SingleSelectField {
                                    id
                                  }
                                }
                              }
                            }
                          }
                          content {
                            ... on Issue {
                              number
                            }
                          }
                        }
                      }
                    }
                  }
                }' -f owner="$PROJECT_OWNER" \
                   -F number="$PROJECT_NUMBER" \
                --jq ".data.user.projectV2.items.nodes[] | select(.content.number == ${parent_number}) | .fieldValues.nodes[] | select(.field.id == \"${STATUS_FIELD_ID}\") | .optionId")

              echo "Attempt ${i}: current optionId=${CURRENT_STATUS}"

              if [ "$CURRENT_STATUS" = "$DONE_OPTION_ID" ]; then
                echo "Verified: Epic #${parent_number} status is Done."
                VERIFIED=true
                break
              fi
            done

            if [ "$VERIFIED" = "false" ]; then
              echo "::error::Failed to verify Done status for epic #${parent_number} after 3 attempts."
              exit 1
            fi

          done <<< "$PARENT_NUMBERS"
